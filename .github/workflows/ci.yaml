name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ZIG_VERSION: 0.16.0

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-24.04
            target: x86_64-linux-gnu
            file_kind: ELF

          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-linux-gnu
            file_kind: ELF

          - name: macOS arm64
            runner: macos-15
            target: aarch64-macos
            file_kind: Mach-O

          - name: macOS x86_64
            runner: macos-15-intel
            target: x86_64-macos
            file_kind: Mach-O

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/Library/Caches/zig
            .zig-cache
          key: ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**/*.zig', 'lib/**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-zig-${{ env.ZIG_VERSION }}-
            ${{ runner.os }}-${{ runner.arch }}-zig-

      - name: Show toolchain
        run: |
          zig version
          uname -a

      - name: Check formatting
        run: zig fmt --check build.zig build.zig.zon src lib

      - name: Run tests
        run: zig build test --summary all

      - name: Build debug
        run: zig build --summary all

      - name: Build release
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }} -Dcpu=baseline --summary all

      - name: Verify release binary platform
        shell: bash
        run: |
          set -euo pipefail

          test -x zig-out/bin/zdu
          file zig-out/bin/zdu

          case "${{ matrix.file_kind }}" in
            Mach-O)
              file zig-out/bin/zdu | grep -q 'Mach-O'
              ;;
            ELF)
              file zig-out/bin/zdu | grep -q 'ELF'
              ;;
            *)
              echo "unknown file_kind: ${{ matrix.file_kind }}" >&2
              exit 1
              ;;
          esac

      - name: Smoke test built binary
        shell: bash
        run: |
          set -euo pipefail
          test -x zig-out/bin/zdu
          file zig-out/bin/zdu || true

      - name: Smoke test xattrs
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          xattr -w user.zdu.ci ok "$tmp"
          got="$(xattr -p user.zdu.ci "$tmp")"
          test "$got" = "ok"